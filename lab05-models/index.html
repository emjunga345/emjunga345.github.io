<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <title>Adding Models to A-Frame</title>
</head>
<body>
    <a-scene background="color: #FAFAFA">

  <a-assets>
    <a-asset-item id="logo" src="LOGO-BG.gltf"></a-asset-item>
    <a-asset-item id="logosm" src="LOGO-SM.gltf"></a-asset-item>
  </a-assets>

<a-entity gltf-model="LOGO-BG.gltf" scale="0.1 0.1 0.1" position="0 1.82148 0"></a-entity>
<a-entity gltf-model="LOGO-SM.gltf" position="0 1.96187 0" scale="0.1 0.1 0.1"></a-entity>

  <a-plane position="-0.02672 0 -0.04866" rotation="-90 50 0" width="4" height="4" color="#7BC8A4" shadow="" material="color: #acc77a" scale="1.47 1 1"></a-plane>
    </a-scene>
    
</body>
</html>
