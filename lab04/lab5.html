<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <title>A-Frame Mixin</title>
</head>
<body>
<a-scene>
    <a-assets>
        <a-mixin id="wall" geometry="primitive: box; width: 2; height: 5; depth: 0.3;"></a-mixin>
        <a-mixin id="column" geometry="primitive: cylinder; radius: 0.5; height: 5;"></a-mixin>
        <a-mixin id="primary" material="color:CornflowerBlue"></a-mixin>
        <a-mixin id="secondary" material="color:hotpink"></a-mixin>
        <a-mixin id="primary" geometry="primitive: cylinder; position="-2.78546 1.13331 -5.07422" radius="0.3" height="1.5" color="#FFC65D">
        </a-mixin>
    </a-assets>

   <a-entity mixin="wall primary" position="0 2.5 -5" geometry="width:10"></a-entity>
   <a-entity mixin="wall secondary" position="-5 2.5 0" rotation="0 90 0" geometry="width:10"></a-entity>
   <a-entity mixin="wall secondary" position="5 2.5 0.2" rotation="0 90 0" geometry="width:10"></a-entity>
   <a-entity mixin="wall primary" position="0 2.5 5" geometry="width:10"></a-entity>
   <a-entity mixin="column primary" position="0 2.5 0"></a-entity> 



   <a-sky color="WhiteSmoke"></a-sky>
   
</body>
</html>
