<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
 <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
       <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.4/dist/aframe-physics-system.min.js"></script>
</head>
<body>
<a-scene physics="debug: true">

<a-sphere position="0 5 -8"
						 radius="0.5"
						 color="#EF2D5E"
						 dynamic-body="shape: sphere; sphereRadius: 0; mass: 0.1;"></a-sphere>

<a-box position="-0.12 0.8595 -8.35061" width="1" height="1.5" depth="0.1" static-body="mass: 0.1; shape: box; sphereRadius: NaN" velocity="" rotation="-16.83 1.18 -1.9399999999999997"></a-box>                        

 <a-plane position="0 0 -4" rotation="-90 0 0" width="20" height="20" color="#7BC8A4" static-body="sphereRadius: NaN" velocity="" scale="0.34 1 1"></a-plane>

    <a-sky color="lightblue"></a-sky>
</a-scene>

    
</body>
</html>
